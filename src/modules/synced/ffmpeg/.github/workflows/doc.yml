name: Doc build

on:
  push:
    branches:
      - main

jobs:
  build_doc:
    runs-on: ubuntu-latest
    env:
      OPAMASSUMEDEPEXTS: true
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build FFmpeg
        uses: ./.github/actions/build-ffmpeg
        with:
          os: ubuntu-latest
      - name: Setup OCaml
        uses: toots/setup-ocaml@fc025b8adbeab94c857af17d6bc53ca55f082871 # master
        with:
          ocaml-compiler: 4.14.x
      - name: Pin locally
        run: opam pin -y add --no-action .
      - name: Install locally
        run: opam install -y --with-doc ffmpeg
      - name: Build doc
        run: opam exec dune build @doc
      - name: Deploy doc
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: _build/default/_doc/_html
