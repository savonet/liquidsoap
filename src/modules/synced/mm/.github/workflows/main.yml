name: CI

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ["5.3"]
        include:
          - os: macos-latest
            extra-packages: ao mad pulseaudio theora
          - os: ubuntu-latest
            extra-packages: alsa ao mad pulseaudio theora
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ocaml/setup-ocaml@15d660006c1d3110d77c34b7faa3bddefe8b82f0 # v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
      - run: opam pin add -n .
      - run: opam install ${{ matrix.extra-packages }}
      - run: opam depext -yt mm
      - run: opam install -t .
