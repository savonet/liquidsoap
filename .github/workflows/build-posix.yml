name: Build POSIX

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      branch:
        required: true
        type: string
      is_fork:
        required: true
        type: string
      is_rolling_release:
        required: true
        type: string
      is_release:
        required: true
        type: string
      is_snapshot:
        required: true
        type: string
      build_os:
        required: true
        type: string
      build_platform:
        required: true
        type: string
      build_include:
        required: true
        type: string
      ocaml_version:
        required: true
        type: string
      minimal_exclude_deps:
        required: true
        type: string

jobs:
  build_posix:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.build_os) }}
        ocaml_version: ${{ fromJson(inputs.ocaml_version) }}
        platform: ${{ fromJson(inputs.build_platform) }}
        include: ${{ fromJson(inputs.build_include) }}
        exclude:
          - os: alpine
            ocaml_version: 5.2.0-ox
    container:
      image: ghcr.io/savonet/liquidsoap:ci-v2-${{ matrix.os }}-${{ matrix.ocaml_version }}
      options: --user root --privileged -v ${{ github.workspace }}/${{ github.run_number }}:/tmp/${{ github.run_number }}
    env:
      HOME: /home/opam
      IS_SNAPSHOT: ${{ inputs.is_snapshot == 'true' }}
    steps:
      - name: Checkout code
        run: |
          sudo -u opam git clone --depth 1 https://github.com/savonet/liquidsoap.git /tmp/liquidsoap
          cd /tmp/liquidsoap
          sudo -u opam git fetch --depth 1 origin ${{ inputs.sha }}
          sudo -u opam git checkout ${{ inputs.sha }}
      - name: Get number of CPU cores
        uses: savonet/github-actions-cpu-cores-docker@c8384053077d8c21cca9333c6388485fc7b136e1 # v1
        id: cpu_cores
      - name: Build
        env:
          GITHUB_SHA: ${{ inputs.sha }}
        run: |
          export CPU_CORES=${{ steps.cpu_cores.outputs.count }}
          sudo -u opam -E /tmp/liquidsoap/.github/scripts/build-posix.sh "${{ steps.cpu_cores.outputs.count }}"
      - name: Build debian package
        if: contains(matrix.os, 'debian') || contains(matrix.os, 'ubuntu')
        id: build_deb
        env:
          GITHUB_SHA: ${{ inputs.sha }}
          BRANCH: ${{ inputs.branch }}
          DOCKER_TAG: ${{ matrix.os }}-ocaml${{ matrix.ocaml_version }}
          LIQ_TMP_DIR: /tmp/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/debian
          PLATFORM: ${{ matrix.platform }}
          IS_ROLLING_RELEASE: ${{ inputs.is_rolling_release }}
          IS_RELEASE: ${{ inputs.is_release }}
          MINIMAL_EXCLUDE_DEPS: ${{ inputs.minimal_exclude_deps }}
          DEB_RELEASE: 1
        run: |
          mkdir -p "${LIQ_TMP_DIR}"
          chown -R opam "${LIQ_TMP_DIR}"
          chown -R opam "${GITHUB_OUTPUT}"
          cd /tmp/liquidsoap
          sudo -u opam -E ./.github/scripts/build-deb.sh
      - name: Print debian package info
        if: contains(matrix.os, 'debian') || contains(matrix.os, 'ubuntu')
        env:
          LIQ_TMP_DIR: /tmp/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/debian
        run: |
          for f in "${LIQ_TMP_DIR}"/*.deb; do
            echo "=== $f ==="
            dpkg-deb --info "$f"
          done
      - name: Upload debian packages artifacts
        if: (contains(matrix.os, 'debian') || contains(matrix.os, 'ubuntu'))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build_deb.outputs.basename }}
          path: ${{ github.workspace }}/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/debian
          if-no-files-found: error
      - name: Build alpine package
        if: matrix.os == 'alpine'
        id: build_apk
        env:
          BRANCH: ${{ inputs.branch }}
          ALPINE_TAG: ocaml${{ matrix.ocaml_version }}
          ARCH: ${{ matrix.platform }}
          LIQ_TMP_DIR: /tmp/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/alpine
          ALPINE_ARCH: ${{ matrix.alpine-arch }}
          IS_ROLLING_RELEASE: ${{ inputs.is_rolling_release }}
          IS_RELEASE: ${{ inputs.is_release }}
          MINIMAL_EXCLUDE_DEPS: ${{ inputs.minimal_exclude_deps }}
          APK_RELEASE: 0
        run: |
          cd /tmp/liquidsoap
          apk update
          apk upgrade
          apk add alpine-sdk
          adduser opam abuild
          mkdir -p "${LIQ_TMP_DIR}"
          chown -R opam "${LIQ_TMP_DIR}"
          chown -R opam "${GITHUB_OUTPUT}"
          sudo -u opam -E abuild-keygen -a -n
          cp /home/opam/.abuild/*.pub /etc/apk/keys/
          sudo -u opam -E ./.github/scripts/build-apk.sh
      - name: Print alpine package info
        if: matrix.os == 'alpine'
        env:
          LIQ_TMP_DIR: /tmp/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/alpine
        run: |
          for f in "${LIQ_TMP_DIR}"/*.apk; do
            echo "=== $f ==="
            tar -xOf "$f" .PKGINFO 2>/dev/null || true
          done
      - name: Upload alpine packages artifacts
        if: matrix.os == 'alpine'
        uses: savonet/artifact-upload-docker-action@b3ed1eeaf18859b6f53c026bf7476aee7e8bd735 # main
        with:
          name: alpine-${{ matrix.ocaml_version }}-${{ matrix.platform }}-packages
          path: /github/workspace/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}/alpine
      - name: Cleanup
        if: ${{ always() }}
        run: |
          rm -rf /tmp/${{ github.run_number }}/${{ matrix.os }}_${{ matrix.platform }}
