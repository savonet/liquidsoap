name: Build CI Docker Images

on:
  workflow_dispatch:
    inputs:
      build_debian:
        description: "Build Debian/Ubuntu CI images"
        required: false
        default: true
        type: boolean
      build_alpine:
        description: "Build Alpine CI images"
        required: false
        default: true
        type: boolean
      debian_base_images:
        description: "Debian/Ubuntu base images (JSON array)"
        required: false
        default: '["debian:forky","debian:trixie","ubuntu:resolute","ubuntu:plucky","ubuntu:noble"]'
        type: string
      debian_ocaml_versions:
        description: "OCaml versions for Debian/Ubuntu (JSON array)"
        required: false
        default: '["4.14.2","5.4.0"]'
        type: string
      alpine_ocaml_versions:
        description: "OCaml versions for Alpine (JSON array)"
        required: false
        default: '["4.14.2","5.4.0"]'
        type: string
      push:
        description: "Push images to registry"
        required: false
        default: true
        type: boolean

jobs:
  build-debian-ci:
    if: ${{ inputs.build_debian }}
    runs-on: depot-ubuntu-24.04-32
    strategy:
      fail-fast: false
      matrix:
        # 2.5.x targets: debian:trixie/forky, ubuntu:resolute/plucky
        # 2.4.x targets: debian:trixie/forky, ubuntu:noble/plucky
        base_image: ${{ fromJSON(inputs.debian_base_images) }}
        ocaml_version: ${{ fromJSON(inputs.debian_ocaml_versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute build args
        id: build_args
        env:
          BASE_IMAGE: ${{ matrix.base_image }}
          OCAML_VERSION: ${{ matrix.ocaml_version }}
        run: |
          TAG=$(echo ${BASE_IMAGE} | sed -e 's#/#_#g' -e 's#:#_#g')
          echo "tag=ghcr.io/savonet/liquidsoap:ci-v2-${TAG}-${OCAML_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          build-args: |
            OCAML_VERSION=${{ matrix.ocaml_version }}
            BASE_IMAGE=${{ matrix.base_image }}
          context: .
          file: .github/docker/debian-base.dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.build_args.outputs.tag }}
          push: ${{ inputs.push }}
          provenance: false
          sbom: false

  build-alpine-ci:
    if: ${{ inputs.build_alpine }}
    runs-on: depot-ubuntu-24.04-32
    strategy:
      fail-fast: false
      matrix:
        ocaml_version: ${{ fromJSON(inputs.alpine_ocaml_versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          build-args: |
            OCAML_VERSION=${{ matrix.ocaml_version }}
          context: .
          file: .github/docker/alpine-base.dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/savonet/liquidsoap:ci-v2-alpine-${{ matrix.ocaml_version }}
          push: ${{ inputs.push }}
          provenance: false
          sbom: false
