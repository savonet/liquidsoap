name: Build Windows

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      branch:
        required: true
        type: string
      is_rolling_release:
        required: true
        type: string
      is_release:
        required: true
        type: string
      is_snapshot:
        required: true
        type: string

jobs:
  build_win32:
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/savonet/liquidsoap:ci-v2-win32-x64-5.4.1
      options: --user root -v ${{ github.workspace }}/${{ github.run_number }}:/tmp/${{ github.run_number }}
    env:
      OPAM_DEPS: camomile-windows,re-windows,sedlex-windows,ssl-windows,winsvc-windows,prometheus-app-windows,cohttp-lwt-unix-windows
      IS_SNAPSHOT: ${{ inputs.is_snapshot == 'true' }}
      IS_ROLLING_RELEASE: ${{ inputs.is_rolling_release }}
      IS_RELEASE: ${{ inputs.is_release }}
      BRANCH: ${{ inputs.branch }}
      TOOLPREF64: /usr/src/mxe/usr/bin/x86_64-w64-mingw32.static-
    steps:
      - name: Checkout code
        run: |
          mkdir -p /tmp/${{ github.run_number }}/win32/liquidsoap
          cd /tmp/${{ github.run_number }}/win32/liquidsoap
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ inputs.sha }}
          git checkout ${{ inputs.sha }}
          chown -R opam /tmp/${{ github.run_number }}/win32
      - name: Build windows binary
        run: |
          mkdir -p /tmp/${{ github.run_number }}/win32/dist
          chown -R opam /tmp/${{ github.run_number }}/win32/dist
          chown -R opam "${GITHUB_OUTPUT}"
          cd /tmp/${{ github.run_number }}/win32/liquidsoap
          gosu opam:root ./.github/scripts/build-win32.sh
        id: build
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.basename }}
          path: ${{ github.workspace }}/${{ github.run_number }}/win32/dist
          if-no-files-found: error
      - name: Cleanup
        if: ${{ always() }}
        run: |
          rm -rf /tmp/${{ github.run_number }}/win32
