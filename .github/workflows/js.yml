name: JS Build

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      branch:
        required: true
        type: string

jobs:
  build_js:
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/savonet/liquidsoap:ci-v2-debian_trixie-5.4.0@sha256:1521b53591f846a76affe11cddc69402de41936523339c3fafa8c248fa396f5d
      options: --user root
    env:
      HOME: /home/opam
    steps:
      - name: Checkout code
        run: |
          sudo -u opam git clone --depth 1 https://github.com/savonet/liquidsoap.git /tmp/liquidsoap
          cd /tmp/liquidsoap
          sudo -u opam git fetch --depth 1 origin ${{ inputs.sha }}
          sudo -u opam git checkout ${{ inputs.sha }}
      - name: Install npm
        run: |
          apt-get update
          apt-get install -y npm
      - name: Build JS
        run: |
          cd /tmp/liquidsoap
          sudo -u opam -E opam remove -y conf-pkg-config conf-lame
          sudo -u opam -E opam update
          sudo -u opam -E opam upgrade -y
          sudo -u opam -E opam install domain_shims
          sudo -u opam -E opam exec -- dune build --profile release src/js --verbose
      - name: Upload JS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: liquidsoap-js-${{ inputs.branch }}
          path: |
            /tmp/liquidsoap/_build/default/src/js/interactive_js.bc.js
            /tmp/liquidsoap/_build/default/src/js/index.html
            /tmp/liquidsoap/_build/default/src/js/playground.bundle.js
          if-no-files-found: error
