name: Retry failed CI jobs
on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string

jobs:
  retry_failed_jobs:
    runs-on: depot-ubuntu-24.04-4
    permissions:
      actions: write
    steps:
      - name: Wait for CI run to complete
        run: gh run watch ${{ inputs.run_id }} --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Re-run failed jobs
        run: gh run rerun ${{ inputs.run_id }} --failed --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
