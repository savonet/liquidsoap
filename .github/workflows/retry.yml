name: Retry failed CI jobs
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  retry_failed_jobs:
    runs-on: depot-ubuntu-24.04-4
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 4
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
