name: Build without optional dependencies

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      minimal_exclude_deps:
        required: true
        type: string

jobs:
  build_no_depopts:
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/savonet/liquidsoap:ci-v2-debian_trixie-5.4.0
      options: --user opam
    env:
      HOME: /home/opam
    steps:
      - name: Get number of CPU cores
        uses: savonet/github-actions-cpu-cores-docker@c8384053077d8c21cca9333c6388485fc7b136e1 # v1
        id: cpu_cores
      - name: Checkout code
        run: |
          cd /tmp/liquidsoap-full/liquidsoap
          git remote set-url origin https://github.com/savonet/liquidsoap.git
          git fetch origin ${{ inputs.sha }}
          git checkout ${{ inputs.sha }}
      - name: Build
        run: |
          echo "::group::Preparing build"
          cd /tmp/liquidsoap-full
          git remote set-url origin https://github.com/savonet/liquidsoap-full.git
          git fetch --recurse-submodules=no
          git checkout origin/master -- Makefile.git
          make public
          git reset --hard
          git submodule foreach 'git reset --hard'
          git pull
          cp PACKAGES.minimal PACKAGES
          opam update
          opam pin -yn .
          opam info -f "depopts:" liquidsoap | grep -v osx-secure-transport | xargs opam remove -y inotify ffmpeg-avutil ctypes cohttp-lwt-unix prometheus-app ${{ inputs.minimal_exclude_deps }}
          echo "::endgroup::"
          opam install -y mem_usage
          cd liquidsoap
          ./.github/scripts/build-posix.sh "${{ steps.cpu_cores.outputs.count }}"
        env:
          LIQ_BUILD_MIN: true
          LIQUIDSOAP_MINIMAL_EXCLUDE_DEPS: ${{ inputs.minimal_exclude_deps }}
