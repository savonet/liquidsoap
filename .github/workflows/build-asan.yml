name: Build ASAN

on:
  workflow_dispatch:
    inputs:
      ocaml_version:
        description: "OCaml version"
        required: false
        default: "5.4.0"
        type: string
  push:
    branches:
      - main
      - "v*-latest"
    paths:
      - ".github/**"
      - "**/*.ml*"
      - "**/*.liq"
      - "**/dune"
      - "**/dune.inc"
  pull_request:
    paths:
      - ".github/**"
      - "**/*.ml*"
      - "**/*.liq"
      - "**/dune"
      - "**/dune.inc"

jobs:
  build:
    runs-on: depot-ubuntu-24.04-32
    container:
      image: ghcr.io/savonet/liquidsoap:ci-asan-${{ inputs.ocaml_version || '5.4.0' }}
      options: --user root --privileged -v ${{ github.workspace }}/${{ github.run_number }}:/tmp/artifacts
    env:
      HOME: /home/opam
      LIQUIDSOAP_INSTALL_NO_OPTIONAL_FAIL: "true"
      OCAML_VERSION: ${{ inputs.ocaml_version || '5.4.0' }}
      BRANCH: ${{ github.head_ref || github.ref_name }}
      ASAN_OPTIONS: "detect_leaks=0:detect_stack_use_after_return=0:detect_container_overflow=0:protect_shadow_gap=0"
      SKIP_SDL: "true"
    outputs:
      basename: ${{ steps.build_deb.outputs.basename }}
    steps:
      - name: Checkout code
        run: |
          sudo -u opam git clone --depth 1 https://github.com/savonet/liquidsoap.git /tmp/liquidsoap
          cd /tmp/liquidsoap
          sudo -u opam git fetch --depth 1 origin ${{ github.sha }}
          sudo -u opam git checkout ${{ github.sha }}
      - name: Get number of CPU cores
        uses: savonet/github-actions-cpu-cores-docker@c8384053077d8c21cca9333c6388485fc7b136e1 # v1
        id: cpu_cores
      - name: Build
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          sudo -u opam -E /tmp/liquidsoap/.github/scripts/build-posix.sh "${{ steps.cpu_cores.outputs.count }}"
      - name: Build debian package
        id: build_deb
        env:
          GITHUB_SHA: ${{ github.sha }}
          DOCKER_TAG: debian-testing-asan-ocaml${{ inputs.ocaml_version || '5.4.0' }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          LIQ_TMP_DIR: /tmp/artifacts
          PLATFORM: amd64
          DEB_RELEASE: "1"
          SKIP_MINIMAL: "true"
        run: |
          mkdir -p /tmp/artifacts
          chown opam /tmp/artifacts
          sudo -u opam -E /tmp/liquidsoap/.github/scripts/build-deb.sh
      - name: Upload debian package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build_deb.outputs.basename }}
          path: ${{ github.workspace }}/${{ github.run_number }}/*.deb
          if-no-files-found: error

  docker:
    needs: build
    runs-on: depot-ubuntu-24.04-32
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Download debian package
        uses: actions/download-artifact@d3f86a3f1bc14cf7e2b4e3a8e2f4c8d3e5e2b1a0 # v4
        with:
          name: ${{ needs.build.outputs.basename }}
          path: /tmp/deb
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          build-args: |
            DEB_FILE=/tmp/deb/${{ needs.build.outputs.basename }}.deb
          context: /tmp/deb
          file: .github/docker/debian-asan-release.dockerfile
          platforms: linux/amd64
          tags: ghcr.io/savonet/liquidsoap:asan-${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
