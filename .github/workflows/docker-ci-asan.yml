name: Build CI ASAN Docker Images

on:
  workflow_dispatch:
    inputs:
      ocaml_versions:
        description: "OCaml versions (JSON array)"
        required: false
        default: '["5.4.0"]'
        type: string
      push:
        description: "Push images to registry"
        required: false
        default: true
        type: boolean
      no_cache:
        description: "Disable Docker layer cache"
        required: false
        default: true
        type: boolean

jobs:
  build-asan:
    runs-on: depot-ubuntu-24.04-32
    strategy:
      fail-fast: false
      matrix:
        ocaml_version: ${{ fromJSON(inputs.ocaml_versions) }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          build-args: |
            OCAML_VERSION=${{ matrix.ocaml_version }}
            LIQUIDSOAP_SHA=${{ github.sha }}
          context: .
          file: .github/docker/debian-asan.dockerfile
          platforms: linux/amd64
          tags: ghcr.io/savonet/liquidsoap:ci-asan-${{ matrix.ocaml_version }}
          push: ${{ inputs.push }}
          no-cache: ${{ inputs.no_cache }}
          provenance: false
          sbom: false
