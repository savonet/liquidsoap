name: Harbor Scale Test

on:
  push:
    branches:
      - main
      - "v*-latest"
    paths:
      - src/core/base/outputs/harbor_output.ml
  pull_request:
    paths:
      - src/core/base/outputs/harbor_output.ml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scale_test:
    runs-on: depot-ubuntu-24.04-4
    container:
      image: savonet/liquidsoap-ci:debian_trixie-5.4.0@sha256:2c0918f04c5f7355f0f5a9768762c5802370665b2bb17eaddf0975a6e7f0cab2
      options: --user root --privileged --ulimit core=-1 --security-opt seccomp=unconfined
    env:
      HOME: /home/opam
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: mp3
            encoder: "%mp3"
            mime: audio/mpeg
          - format: ogg
            encoder: "%vorbis"
            mime: audio/ogg
          - format: opus
            encoder: "%opus"
            mime: audio/ogg
          - format: ffmpeg
            encoder: '%ffmpeg(format="adts", %audio(codec="aac"))'
            mime: audio/aac

    steps:
      - name: Get number of CPU cores
        uses: savonet/github-actions-cpu-cores-docker@c8384053077d8c21cca9333c6388485fc7b136e1 # v1
        id: cpu_cores

      - name: Checkout code
        run: |
          cd /tmp/liquidsoap-full/liquidsoap
          sudo -u opam -E git remote set-url origin https://github.com/savonet/liquidsoap.git
          sudo -u opam -E git fetch origin ${{ github.sha }}
          sudo -u opam -E git checkout ${{ github.sha }}

      - name: Install Node.js and ffprobe
        run: |
          apt-get update -qq
          apt-get install -y nodejs ffmpeg

      - name: Build
        env:
          CPU_CORES: ${{ steps.cpu_cores.outputs.count }}
        run: |
          cd /tmp/liquidsoap-full/liquidsoap
          sudo -u opam -E ./.github/scripts/add-local-opam-packages.sh
          sudo -u opam -E ./.github/scripts/build-posix.sh "${{ steps.cpu_cores.outputs.count }}"
          echo "OCAMLPATH=$(cat /tmp/liquidsoap-full/.ocamlpath)" >> "$GITHUB_ENV"

      - name: Test shared encoder (${{ matrix.format }})
        run: |
          cd /tmp/liquidsoap-full/liquidsoap
          sudo -u opam -E bash tests/harbor/scale-test.sh \
            '${{ matrix.encoder }}' '${{ matrix.mime }}' 9900

      - name: Test dedicated encoder (${{ matrix.format }})
        run: |
          cd /tmp/liquidsoap-full/liquidsoap
          sudo -u opam -E bash tests/harbor/scale-test.sh \
            '${{ matrix.encoder }}' '${{ matrix.mime }}' 9901 dedicated

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: scale-results-${{ matrix.format }}
          path: |
            /tmp/liquidsoap-scale-9900.log
            /tmp/liquidsoap-scale-9901.log
