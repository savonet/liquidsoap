name: Build Windows Cross-Compilation CI Image

on:
  workflow_dispatch:
    inputs:
      ocaml_versions:
        description: "OCaml versions (JSON array)"
        required: false
        default: '["5.4.1"]'
        type: string
      no_cache:
        description: "Disable Docker layer cache"
        required: false
        default: false
        type: boolean
      push:
        description: "Push image to registry"
        required: false
        default: true
        type: boolean

jobs:
  build-win32-ci:
    runs-on: depot-ubuntu-24.04-16
    strategy:
      fail-fast: false
      matrix:
        ocaml_version: ${{ fromJSON(inputs.ocaml_versions) }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Build and push
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          token: ${{ secrets.DEPOT_TOKEN }}
          build-args: |
            OCAML_VERSION=${{ matrix.ocaml_version }}
          context: .
          file: .github/docker/win32-base.dockerfile
          platforms: linux/amd64
          tags: ghcr.io/savonet/liquidsoap:ci-v2-win32-x64-${{ matrix.ocaml_version }}
          push: ${{ inputs.push }}
          no-cache: ${{ inputs.no_cache }}
          provenance: false
          sbom: false
